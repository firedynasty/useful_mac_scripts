<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Study Presentation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slide-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            min-height: 400px;
            position: relative;
        }

        .slide {
            display: none;
            animation: fadeEffect 0.5s;
        }

        .slide.active {
            display: block;
        }

        @keyframes fadeEffect {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .slide-title {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }

        .slide-content {
            font-size: 1.2em;
            color: #34495e;
            line-height: 1.6;
        }

        .slide-content ul {
            list-style-type: none;
            padding: 0;
        }

        .slide-content li {
            margin: 15px 0;
            padding-left: 20px;
            position: relative;
        }

        .slide-content li:before {
            content: "•";
            color: #3498db;
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .slide-indicator {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div id="slides"></div>

        <div class="slide-indicator">
            Slide <span id="currentSlide">1</span> of <span id="totalSlides">6</span>
        </div>
    </div>

    <script>
       
        let currentSlideIndex = 0;

        function createSlideHTML(slide, index) {
            return `
                <div class="slide ${index === 0 ? 'active' : ''}" data-slide="${index}">
                    <h1 class="slide-title">${slide.title}</h1>
                    <div class="controls">
                        <button id="prevBtn" onclick="changeSlide(-1)">Previous</button>
                        <button id="nextBtn" onclick="changeSlide(1)">Next</button>
                    </div>
                    <div class="slide-content">
                        <ul>
                            ${slide.content.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        function initializeSlides() {
            const slidesContainer = document.getElementById('slides');
            slidesContainer.innerHTML = slides.map((slide, index) => 
                createSlideHTML(slide, index)
            ).join('');
            
            document.getElementById('totalSlides').textContent = slides.length;
            updateNavigationButtons();
        }

        function changeSlide(direction) {
            let newIndex = currentSlideIndex + direction;
            
            // Handle wrapping around
            if (newIndex >= slides.length) {
                newIndex = 0;  // Loop back to first slide
            } else if (newIndex < 0) {
                newIndex = slides.length - 1;  // Loop to last slide
            }
            
            document.querySelector(`.slide[data-slide="${currentSlideIndex}"]`).classList.remove('active');
            document.querySelector(`.slide[data-slide="${newIndex}"]`).classList.add('active');
            currentSlideIndex = newIndex;
            document.getElementById('currentSlide').textContent = currentSlideIndex + 1;
            updateNavigationButtons();
        }

        function updateNavigationButtons() {
            // Remove disabled states since we're allowing circular navigation
            document.getElementById('prevBtn').disabled = false;
            document.getElementById('nextBtn').disabled = false;
        }

        // Add keyboard navigation
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                changeSlide(-1);
            } else if (event.key === 'ArrowRight' || event.key === 'PageDown') {
                changeSlide(1);
            }
        });

        // Initialize the slides when the page loads
        initializeSlides();
    </script>
</body>
</html>
